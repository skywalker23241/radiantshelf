{% extends "base.html" %}
{% block title %}{{ _('login_title') }}{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 60vh;">
    <div class="col-md-5 col-lg-4">
        <div class="text-center mb-5">
            <div class="bg-primary bg-opacity-10 rounded-circle d-flex align-items-center justify-content-center mx-auto mb-4"
                style="width: 64px; height: 64px;">
                <i class="bi bi-crosshair text-primary fs-2"></i>
            </div>
            <h2 class="fw-bold tracking-tight mb-2">{{ _('login_heading') }}</h2>
            <p class="text-muted small">{{ _('login_subtitle') }}</p>
        </div>

        <div class="card shadow-lg border-muted">
            <div class="card-body p-4">
                <form method="POST" action="{{ url_for('login') }}">
                    <div class="mb-3">
                        <label for="login_name"
                            class="form-label small fw-semibold uppercase letter-spacing-widest text-muted">{{
                            _('login_username') }}</label>
                        <input type="text" class="form-control py-2" id="login_name" name="login_name" required
                            autofocus placeholder="username">
                    </div>
                    <div class="mb-4">
                        <div class="d-flex justify-content-between align-items-center mb-1">
                            <label for="password"
                                class="form-label small fw-semibold uppercase letter-spacing-widest text-muted mb-0">{{
                                _('login_password') }}</label>
                        </div>
                        <input type="password" class="form-control py-2" id="password" name="password" required
                            placeholder="••••••••">
                    </div>
                    <button type="submit"
                        class="btn btn-primary w-100 py-2 fw-bold d-flex align-items-center justify-content-center gap-2">
                        <i class="bi bi-box-arrow-in-right"></i> {{ _('login_submit') }}
                    </button>
                </form>
            </div>
        </div>

        <div class="text-center mt-4">
            <p class="text-muted small">
                {{ _('login_no_account') }}
                <a href="{{ url_for('register') }}" class="text-primary text-decoration-none fw-semibold">
                    {{ _('login_register_link') }}
                </a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
