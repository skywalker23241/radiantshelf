{% extends "base.html" %}
{% block title %}{{ _('register_title') }}{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center mb-5">
    <div class="col-md-5 col-lg-4">
        <div class="text-center mb-5 pt-4">
            <div class="bg-primary bg-opacity-10 rounded-circle d-flex align-items-center justify-content-center mx-auto mb-4"
                style="width: 64px; height: 64px;">
                <i class="bi bi-person-plus text-primary fs-2"></i>
            </div>
            <h2 class="fw-bold tracking-tight mb-2">{{ _('register_heading') }}</h2>
            <p class="text-muted small">{{ _('register_subtitle') }}</p>
        </div>

        <div class="card shadow-lg border-muted">
            <div class="card-body p-4">
                <form method="POST" action="{{ url_for('register') }}">
                    <div class="mb-3">
                        <label for="login_name"
                            class="form-label small fw-semibold uppercase letter-spacing-widest text-muted">
                            {{ _('register_username') }} <span class="text-primary">*</span>
                        </label>
                        <input type="text" class="form-control py-2" id="login_name" name="login_name" required
                            autofocus placeholder="{{ _('register_username_placeholder') }}">
                    </div>
                    <div class="mb-3">
                        <label for="display_name"
                            class="form-label small fw-semibold uppercase letter-spacing-widest text-muted">
                            {{ _('register_nickname') }}
                        </label>
                        <input type="text" class="form-control py-2" id="display_name" name="display_name"
                            placeholder="{{ _('register_nickname_placeholder') }}">
                    </div>
                    <div class="mb-3">
                        <label for="password"
                            class="form-label small fw-semibold uppercase letter-spacing-widest text-muted">
                            {{ _('register_password') }} <span class="text-primary">*</span>
                        </label>
                        <input type="password" class="form-control py-2" id="password" name="password" required
                            minlength="6" placeholder="{{ _('register_password_placeholder') }}">
                    </div>
                    <div class="mb-4">
                        <label for="password2"
                            class="form-label small fw-semibold uppercase letter-spacing-widest text-muted">
                            {{ _('register_confirm_password') }} <span class="text-primary">*</span>
                        </label>
                        <input type="password" class="form-control py-2" id="password2" name="password2" required
                            minlength="6" placeholder="••••••••">
                    </div>
                    <button type="submit"
                        class="btn btn-primary w-100 py-2 fw-bold d-flex align-items-center justify-content-center gap-2">
                        <i class="bi bi-person-plus"></i> {{ _('register_submit') }}
                    </button>
                </form>
            </div>
        </div>

        <div class="text-center mt-4 mb-5">
            <p class="text-muted small">
                {{ _('register_has_account') }}
                <a href="{{ url_for('login') }}" class="text-primary text-decoration-none fw-semibold">
                    {{ _('register_login_link') }}
                </a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
